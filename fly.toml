# fly.toml app configuration file generated for my-line-bot-demo on 2026-02-17T06:29:40Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'my-line-bot-demo'
primary_region = 'nrt'

[build]

# Path overrides: persistent volume at /app/data, static images at /app/static-images
[env]
  DB_PATH    = '/app/data/betting.sqlite'
  EXPORT_DIR = '/app/data/exports'
  BACKUP_DIR = '/app/data/backups'
  IMAGE_DIR  = '/app/static-images'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

# Persistent volume for SQLite, exports, and backups
[[mounts]]
  source      = 'bot_data'
  destination = '/app/data'

[[vm]]
  memory   = '512mb'
  cpu_kind = 'shared'
  cpus     = 1
